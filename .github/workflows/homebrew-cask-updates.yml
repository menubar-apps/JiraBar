name: Homebrew cask updates

on:
  release:
    types: [published]
  # Manual trigger from the UI
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.5)
        required: false

jobs:
  bump-casks:
    runs-on: macos-latest
    steps:
      - name: Prepare Homebrew
        run: brew update-reset

      - name: Bump jirabar cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_JIRABAR_PUBLISH_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG}" ]; then
            echo "Could not determine release tag"
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"

          brew tap menubar-apps/homebrew-menubar-apps
          brew bump-cask-pr \
            --version "${VERSION}" \
            --no-audit \
            --no-style \
            --no-browse \
            menubar-apps/homebrew-menubar-apps/jirabar
